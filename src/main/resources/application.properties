server.port=8080

spring.datasource.url=jdbc:h2:file:./data/bountygrid
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

bountygrid.jwt.secret=${BOUNTYGRID_JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
bountygrid.jwt.expiration-days=7
bountygrid.upload-dir=${BOUNTYGRID_UPLOAD_DIR:uploads}
bountygrid.cors.allowed-origins=${BOUNTYGRID_CORS_ALLOWED_ORIGINS:*}
