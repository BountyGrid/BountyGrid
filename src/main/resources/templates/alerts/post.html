<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head><title>Post Alert</title></head>
<body>
<main layout:fragment="content" class="page narrow">
    <h1>Post alert</h1>
    <form th:action="@{/alerts/create}" th:object="${alertRequest}" method="post" enctype="multipart/form-data">
        <input th:field="*{title}" placeholder="Title" required>
        <textarea th:field="*{description}" placeholder="Description"></textarea>
        <select th:field="*{alertType}" required>
            <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
        </select>
        <select th:field="*{category}" required>
            <option th:each="category : ${categories}" th:value="${category}" th:text="${category}"></option>
        </select>
        <input th:field="*{latitude}" type="number" step="0.000001" placeholder="Latitude" required>
        <input th:field="*{longitude}" type="number" step="0.000001" placeholder="Longitude" required>
        <input th:field="*{city}" placeholder="City">
        <input th:field="*{radiusKm}" type="number" min="1" max="25" step="0.5" placeholder="Radius km">
        <input th:field="*{rewardAmount}" type="number" min="0" step="0.01" placeholder="Reward">
        <input name="photo" type="file" accept="image/png,image/jpeg,image/webp">
        <button class="primary" type="submit">Create alert</button>
    </form>
</main>
</body>
</html>
