<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - BountyGrid</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth">
    <h1>Log in</h1>
    <form th:action="@{/login}" th:object="${loginRequest}" method="post">
        <input th:field="*{email}" type="email" placeholder="Email" required>
        <input th:field="*{password}" type="password" placeholder="Password" required>
        <button class="primary" type="submit">Log in</button>
    </form>
    <a th:href="@{/register}">Create account</a>
</main>
</body>
</html>
